<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X 初心者クエスト</title><meta property="og:image" content="https://r9j99qs7vb-ui.github.io/x-quest/ogp.svg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://r9j99qs7vb-ui.github.io/x-quest/ogp.svg">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f4f0; color: #1a1a1a; font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 20px; }
  .container { width: 100%; max-width: 440px; }
  .header { margin-bottom: 36px; animation: fadeUp 0.5s ease forwards; }
  .header-label { font-size: 12px; letter-spacing: 3px; color: #999; margin-bottom: 8px; }
  .header h1 { font-size: 26px; font-weight: 900; line-height: 1.4; }
  .progress-wrap { margin-bottom: 32px; animation: fadeUp 0.5s 0.05s ease both; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 14px; color: #888; margin-bottom: 10px; }
  .progress-bar { height: 6px; background: #ddd; border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: #1a1a1a; border-radius: 99px; transition: width 0.4s ease; width: 0%; }
  .quest-card { background: #fff; border-radius: 16px; padding: 36px 28px; margin-bottom: 20px; box-shadow: 0 2px 16px rgba(0,0,0,0.07); animation: fadeUp 0.5s 0.1s ease both; min-height: 160px; }
  .quest-number { font-size: 12px; letter-spacing: 2px; color: #bbb; margin-bottom: 18px; }
  .quest-text { font-size: 20px; line-height: 1.8; font-weight: 700; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; animation: fadeUp 0.5s 0.15s ease both; }
  .btn { border: none; border-radius: 12px; padding: 22px 16px; font-family: 'Noto Sans JP', sans-serif; font-size: 18px; font-weight: 700; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
  .btn:active { transform: scale(0.96); }
  .btn-no { background: #e8e8e8; color: #666; }
  .btn-yes { background: #1a1a1a; color: #fff; }
  .result { display: none; animation: fadeUp 0.5s ease both; }
  .result.visible { display: block; }
  .rank-card { background: #fff; border-radius: 16px; padding: 40px 28px; text-align: center; margin-bottom: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.07); }
  .rank-label { font-size: 12px; letter-spacing: 3px; color: #bbb; margin-bottom: 16px; }
  .rank-title { font-size: 34px; font-weight: 900; margin-bottom: 8px; }
  .rank-score { font-size: 14px; color: #aaa; margin-bottom: 24px; }
  .rank-message { font-size: 16px; line-height: 1.9; color: #555; text-align: left; border-top: 1px solid #eee; padding-top: 22px; white-space: pre-line; }
  .next-card { background: #fff; border-radius: 16px; padding: 26px 28px; margin-bottom: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.07); }
  .next-label { font-size: 12px; letter-spacing: 2px; color: #bbb; margin-bottom: 12px; }
  .next-text { font-size: 17px; line-height: 1.8; font-weight: 700; }
  .btn-tweet { width: 100%; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; padding: 22px; font-family: 'Noto Sans JP', sans-serif; font-size: 17px; font-weight: 700; cursor: pointer; margin-bottom: 10px; transition: opacity 0.2s; }
  .btn-retry { width: 100%; background: #e8e8e8; color: #777; border: none; border-radius: 12px; padding: 20px; font-family: 'Noto Sans JP', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-label">X BEGINNER QUEST</div>
    <h1>今日のクエストを<br>クリアしよう</h1>
  </div>
  <div id="quiz-section">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="progress-label">1 / 5</span>
        <span id="score-label">スコア 0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
    <div class="quest-card">
      <div class="quest-number" id="quest-number">MISSION 01</div>
      <div class="quest-text" id="quest-text"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-no" onclick="answer(false)">まだ</button>
      <button class="btn btn-yes" onclick="answer(true)">やった！</button>
    </div>
  </div>
  <div class="result" id="result-section">
    <div class="rank-card">
      <div class="rank-label">TODAY'S RESULT</div>
      <div class="rank-title" id="result-rank"></div>
      <div class="rank-score" id="result-score"></div>
      <div class="rank-message" id="result-message"></div>
    </div>
    <div class="next-card">
      <div class="next-label">明日のミッション</div>
      <div class="next-text" id="next-quest-text"></div>
    </div>
    <button class="btn-tweet" onclick="tweet()">Xでシェアする</button>
    <button class="btn-retry" onclick="retry()">もう一度やる</button>
  </div>
</div>
<script>
const quests = [
  { text: "今日、Xを開いてタイムラインを眺めましたか？", point: 1 },
  { text: "気になる投稿に「いいね」を1つでもしましたか？", point: 1 },
  { text: "誰かの投稿を読んで「なるほど」と思いましたか？", point: 1 },
  { text: "今日、自分で何か投稿（またはリポスト）しましたか？", point: 2 },
  { text: "誰かにリプライを送るか、フォローしましたか？", point: 2 },
];
const ranks = [
  { min: 0, title: "Lurker Lv.1", message: "まずは見るだけでOK。\nXの空気を肌で感じることが最初の一歩です。焦らず観察を続けよう。", next: "気になった投稿に「いいね」を1回だけ押してみる。それだけでいい。" },
  { min: 2, title: "Wanderer Lv.2", message: "少しずつ動き始めている。\n「いいね」は立派なアクション。あなたの反応が誰かの励みになっています。", next: "「面白い」と思った投稿を、一言添えてリポストしてみよう。" },
  { min: 4, title: "Scout Lv.3", message: "確実に前進している。\n発信と受信のサイクルが生まれ始めています。この調子で続けよう。", next: "「今日あったこと」を140字でまとめて投稿してみよう。" },
  { min: 6, title: "Explorer Lv.4", message: "行動力が身についてきた。\nXは投稿数より継続性がものをいう。明日も同じペースで続けよう。", next: "気になるアカウントを3人フォローして、交流の輪を広げよう。" },
  { min: 7, title: "Pioneer Lv.5", message: "全ミッション完了。素晴らしい。\n発信・共感・つながり——今日やるべきことを全てこなした。この積み重ねが実力になる。", next: "明日も同じことを続けよう。習慣こそが最強の武器。" },
];
let current = 0, score = 0;
const maxScore = quests.reduce((a, q) => a + q.point, 0);
function updateDisplay() {
  const q = quests[current];
  document.getElementById('quest-number').textContent = `MISSION 0${current + 1}`;
  document.getElementById('quest-text').textContent = q.text;
  document.getElementById('progress-label').textContent = `${current + 1} / ${quests.length}`;
  document.getElementById('score-label').textContent = `スコア ${score}`;
  document.getElementById('progress-fill').style.width = `${(current / quests.length) * 100}%`;
}
function answer(yes) {
  if (yes) score += quests[current].point;
  current++;
  current < quests.length ? updateDisplay() : showResult();
}
function showResult() {
  document.getElementById('quiz-section').style.display = 'none';
  document.getElementById('result-section').classList.add('visible');
  const rank = [...ranks].reverse().find(r => score >= r.min) || ranks[0];
  document.getElementById('result-rank').textContent = rank.title;
  document.getElementById('result-score').textContent = `スコア ${score} / ${maxScore}`;
  document.getElementById('result-message').textContent = rank.message;
  document.getElementById('next-quest-text').textContent = rank.next;
}
function tweet() {
  const rank = document.getElementById('result-rank').textContent;
  const sc = document.getElementById('result-score').textContent;
  const next = document.getElementById('next-quest-text').textContent;
  const text = `【X初心者クエスト】\n今日の称号：${rank}\n${sc}\n\n明日のミッション：${next}\n\n#X初心者クエスト #X初心者`;
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
}
function retry() {
  current = 0; score = 0;
  document.getElementById('result-section').classList.remove('visible');
  document.getElementById('quiz-section').style.display = '';
  updateDisplay();
}
updateDisplay();
</script>
</body>
</html>
